<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kohler Deli</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #8b1a1a;
    --red-light: #b52b2b;
    --cream: #f5f0e8;
    --cream-dark: #e8e0d0;
    --ink: #1a1a14;
    --muted: #7a7a6a;
    --danger: #c0392b;
    --accent: #e8b84b;
    --active-bg: #fdf3f3;
    --active-border: #c96060;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* HEADER */
  header {
    background: var(--red);
    padding: 20px 20px 16px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .logo { font-family: 'Playfair Display', serif; color: var(--cream); font-size: 22px; line-height: 1; }
  .logo span { display: block; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em; color: var(--accent); text-transform: uppercase; margin-top: 2px; font-weight: 400; }
  .home-btn { background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.25); border-radius: 10px; color: white; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; text-decoration: none; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
  .home-btn:active { background: rgba(255,255,255,0.22); }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .cart-btn { background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.25); border-radius: 12px; color: white; padding: 8px 14px; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 7px; }
  .cart-btn:active { background: rgba(255,255,255,0.22); }
  .cart-count { background: var(--accent); color: var(--ink); border-radius: 999px; font-size: 10px; font-weight: 500; min-width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
  .search-wrap { position: relative; }
  .search-wrap input { width: 100%; background: rgba(255,255,255,0.13); border: 1.5px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 9px 14px 9px 38px; color: white; font-family: 'DM Sans', sans-serif; font-size: 16px; outline: none; }
  .search-wrap input::placeholder { color: rgba(255,255,255,0.5); }
  .search-wrap input:focus { background: rgba(255,255,255,0.2); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; }

  /* LIST */
  .items-list { padding: 16px 16px 180px; display: flex; flex-direction: column; gap: 10px; }
  .section-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); padding: 10px 4px 2px; }

  /* ITEM CARD */
  .item-card { background: white; border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border: 1.5px solid transparent; transition: border-color 0.18s, background 0.18s; }
  .item-card.has-order { border-color: var(--active-border); background: var(--active-bg); }
  .item-emoji { font-size: 28px; width: 38px; text-align: center; flex-shrink: 0; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; font-weight: 500; }
  .item-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.04em; }

  /* ON HAND */
  .onhand-wrap { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
  .onhand-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }
  .onhand-drum { width: 52px; height: 32px; position: relative; border: 1.5px solid var(--cream-dark); border-radius: 6px; background: var(--cream); overflow: hidden; cursor: ns-resize; touch-action: none; user-select: none; -webkit-user-select: none; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s, background 0.15s; }
  .onhand-drum.dialing { border-color: var(--active-border); background: #fff; }
  .onhand-drum-val { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--ink); position: absolute; width: 100%; text-align: center; pointer-events: none; }
  .onhand-drum-val.muted { color: var(--muted); font-size: 13px; }
  @keyframes drumSlideInUp   { from { transform: translateY(110%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes drumSlideInDown { from { transform: translateY(-110%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes drumSlideOutUp   { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-110%); opacity: 0; } }
  @keyframes drumSlideOutDown { from { transform: translateY(0); opacity: 1; } to { transform: translateY(110%); opacity: 0; } }
  @keyframes drumPop { 0%,100% { transform: scale(1); } 45% { transform: scale(1.25); } }

  /* QTY STEPPER */
  .qty-control { display: flex; align-items: center; background: var(--cream); border-radius: 10px; overflow: hidden; border: 1.5px solid var(--cream-dark); flex-shrink: 0; }
  .qty-btn { width: 36px; height: 36px; border: none; background: transparent; font-size: 20px; color: var(--red); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.12s; -webkit-tap-highlight-color: transparent; user-select: none; }
  .qty-btn:active { background: var(--cream-dark); }
  .qty-num { min-width: 34px; text-align: center; font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; }

  /* CUSTOM SECTION */
  .custom-section { background: white; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border: 1.5px solid var(--cream-dark); overflow: hidden; }
  .custom-section-header { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; border-bottom: 1px solid var(--cream-dark); }
  .custom-section-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
  .add-custom-btn { display: flex; align-items: center; gap: 5px; background: var(--red); color: white; border: none; border-radius: 8px; padding: 5px 12px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .add-custom-btn:active { background: var(--red-light); }

  .custom-row { display: flex; align-items: center; gap: 8px; padding: 9px 10px 9px 14px; border-bottom: 1px solid var(--cream-dark); }
  .custom-row:last-child { border-bottom: none; }
  .custom-row.filled { background: var(--active-bg); }

  .custom-name-input {
    flex: 1; border: none; border-radius: 0; padding: 5px 0;
    font-family: 'DM Sans', sans-serif; font-size: 16px; color: var(--ink);
    background: transparent; outline: none; min-width: 0;
    border-bottom: 1.5px solid transparent;
    transition: border-color 0.15s;
  }
  .custom-name-input:focus { border-bottom-color: var(--active-border); }
  .custom-name-input::placeholder { color: #bbb; }

  .custom-delete-btn { width: 30px; height: 30px; border: none; background: transparent; color: #ccc; font-size: 20px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border-radius: 6px; -webkit-tap-highlight-color: transparent; transition: color 0.15s; }
  .custom-delete-btn:active { color: var(--danger); }

  .custom-empty { padding: 16px; font-family: 'DM Mono', monospace; font-size: 11px; color: #ccc; letter-spacing: 0.06em; text-align: center; }

  /* FOOTER */
  .order-footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: white; border-top: 1.5px solid var(--cream-dark); padding: 14px 20px 24px; box-shadow: 0 -4px 24px rgba(0,0,0,0.10); z-index: 200; display: none; }
  .order-footer.visible { display: block; }
  .footer-title { font-family: 'Playfair Display', serif; font-size: 16px; margin-bottom: 2px; }
  .footer-items { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 10px; }
  .submit-btn { width: 100%; background: var(--red); color: white; border: none; border-radius: 12px; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; }
  .submit-btn:active { background: var(--red-light); }

  /* SHEET */
  .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300; display: none; align-items: flex-end; }
  .sheet-overlay.open { display: flex; }
  .sheet { background: white; border-radius: 20px 20px 0 0; width: 100%; max-height: 80vh; overflow-y: auto; padding: 20px 20px 40px; animation: slideUp 0.28s cubic-bezier(0.22,1,0.36,1); }
  @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .sheet-handle { width: 40px; height: 4px; background: var(--cream-dark); border-radius: 999px; margin: 0 auto 18px; }
  .sheet-title { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 4px; }
  .sheet-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 18px; letter-spacing: 0.06em; }
  .sheet-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--cream-dark); }
  .sheet-item:last-child { border-bottom: none; }
  .sheet-item-name { font-size: 14px; font-weight: 500; }
  .sheet-item-badge { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; }
  .sheet-item-qty { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--red); font-weight: 500; background: var(--active-bg); border-radius: 8px; padding: 4px 10px; }
  .sheet-actions { display: flex; gap: 10px; margin-top: 22px; }
  .btn-secondary { flex: 1; border: 1.5px solid var(--cream-dark); background: white; color: var(--ink); border-radius: 12px; padding: 13px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; }
  .btn-copy { flex: 2; background: var(--red); color: white; border: none; border-radius: 12px; padding: 13px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-imessage { display: block; width: 100%; margin-top: 10px; background: #2196F3; color: white; border: none; border-radius: 12px; padding: 13px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; text-align: center; box-sizing: border-box; touch-action: manipulation; }
  .btn-imessage:active { background: #1976D2; }
  .btn-clear { width: 100%; margin-top: 10px; background: transparent; border: 1.5px solid #e0c0bc; color: var(--danger); border-radius: 12px; padding: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; }
  .btn-clear:active { background: #fdf0ee; }

  /* CONFIRM */
  .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; display: none; align-items: center; justify-content: center; padding: 24px; }
  .confirm-overlay.open { display: flex; }
  .confirm-box { background: white; border-radius: 18px; padding: 28px 24px 22px; width: 100%; max-width: 320px; text-align: center; animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn { from { transform: scale(0.88); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .confirm-icon { font-size: 34px; margin-bottom: 10px; }
  .confirm-title { font-family: 'Playfair Display', serif; font-size: 19px; margin-bottom: 8px; }
  .confirm-msg { font-size: 13px; color: var(--muted); margin-bottom: 22px; line-height: 1.5; }
  .confirm-actions { display: flex; gap: 10px; }
  .confirm-cancel { flex: 1; border: 1.5px solid var(--cream-dark); background: white; color: var(--ink); border-radius: 10px; padding: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; }
  .confirm-ok { flex: 1; background: var(--danger); color: white; border: none; border-radius: 10px; padding: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">Kohler Deli<span>Meats Order</span></div>
    <div class="header-actions">
      <a href="index.html" class="home-btn">🏠</a>
      <button class="cart-btn" onclick="openSheet()">
        <span>🥩</span><span>Order</span>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search meats…" oninput="filterItems()">
  </div>
</header>

<div class="items-list" id="itemsList"></div>

<div class="order-footer" id="orderFooter">
  <div class="footer-title">Ready to order</div>
  <div class="footer-items" id="footerItems"></div>
  <button class="submit-btn" onclick="openSheet()">Review Order →</button>
</div>

<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheetOutside(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Order Summary</div>
    <div class="sheet-date" id="sheetDate"></div>
    <div id="sheetItems"></div>
    <div class="sheet-actions">
      <button class="btn-secondary" onclick="closeSheet()">← Back</button>
      <button class="btn-copy" id="copyBtn" onclick="copyOrder()">📋 Copy Order</button>
    </div>
    <button class="btn-imessage" onclick="sendImessage()">💬 Send via iMessage</button>
    <button class="btn-clear" onclick="confirmClear()">🗑 Clear Order</button>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑</div>
    <div class="confirm-title">Clear entire order?</div>
    <div class="confirm-msg">All quantities and custom items will be reset.</div>
    <div class="confirm-actions">
      <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-ok" onclick="clearCart()">Yes, clear it</button>
    </div>
  </div>
</div>

<script>
const MEATS = [
  { name: "Provolone",  emoji: "🧀", cat: "Cheese" },
  { name: "Swiss",      emoji: "🧀", cat: "Cheese" },
  { name: "Turkey",     emoji: "🦃", cat: "Poultry" },
  { name: "Salami",     emoji: "🥩", cat: "Cured Meats" },
  { name: "Pepperoni",  emoji: "🍕", cat: "Cured Meats" },
  { name: "Capicola",   emoji: "🥩", cat: "Cured Meats" },
  { name: "Ham",        emoji: "🍖", cat: "Cured Meats", halfStep: true },
];

const orders = {};
let customItems = [];
let nextId = 1;
let searchQuery = "";

function initOrders() {
  MEATS.forEach(m => { orders[m.name] = { steps: 0, onHand: "" }; });
}

function sid(name) { return name.replace(/[^a-zA-Z0-9]/g, "_"); }
function esc(s) { return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

function fmt(steps) {
  if (!steps) return "0";
  const w = Math.floor(steps / 2), h = steps % 2;
  if (!w) return "½";
  return h ? `${w}½` : `${w}`;
}

function getVisible() {
  return MEATS.filter(m => m.name.toLowerCase().includes(searchQuery));
}

/* ---- RENDER ---- */
function renderItems() {
  const visible = getVisible();
  const byCat = {};
  visible.forEach(m => { (byCat[m.cat] = byCat[m.cat]||[]).push(m); });

  let html = "";
  Object.entries(byCat).forEach(([cat, items]) => {
    html += `<div class="section-label">${cat}</div>`;
    items.forEach(m => html += meatCard(m));
  });
  html += customSection();
  document.getElementById("itemsList").innerHTML = html;
}

function meatCard(m) {
  const o = orders[m.name], active = o.steps > 0;
  return `
    <div class="item-card${active?" has-order":""}" id="card-${sid(m.name)}">
      <div class="item-emoji">${m.emoji}</div>
      <div class="item-info">
        <div class="item-name">${m.name}</div>
        ${m.halfStep?`<div class="item-meta">INCREMENTS OF ½</div>`:""}
        <div class="onhand-wrap">
          <span class="onhand-label">ON HAND:</span>
          <div class="onhand-drum" id="drum-${sid(m.name)}"
            ontouchstart="dialStart('${m.name}',this,event)"
            ontouchmove="dialMove('${m.name}',this,event)"
            ontouchend="dialEnd('${m.name}',this,event)"
            onwheel="scrollOnHand('${m.name}',this,event)"
            onclick="drumTap('${m.name}',this)">
            <span class="onhand-drum-val${o.onHand==='' ? ' muted' : ''}" id="drumval-${sid(m.name)}">${o.onHand !== '' ? o.onHand : '—'}</span>
          </div>
        </div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeSteps('${m.name}',-1)">−</button>
        <div class="qty-num" id="qty-${sid(m.name)}">${fmt(o.steps)}</div>
        <button class="qty-btn" onclick="changeSteps('${m.name}',1)">+</button>
      </div>
    </div>`;
}

function customSection() {
  const rows = customItems.map(c => `
    <div class="custom-row${c.name.trim()&&c.qty>0?" filled":""}" id="crow-${c.id}">
      <input class="custom-name-input" type="text" placeholder="Item name…"
        value="${esc(c.name)}"
        oninput="updateCustomName(${c.id},this.value)">
      <div class="qty-control">
        <button class="qty-btn" onclick="changeCustomQty(${c.id},-1)">−</button>
        <div class="qty-num" id="cqty-${c.id}">${c.qty}</div>
        <button class="qty-btn" onclick="changeCustomQty(${c.id},1)">+</button>
      </div>
      <button class="custom-delete-btn" onclick="removeCustom(${c.id})">×</button>
    </div>`).join("");

  return `
    <div class="section-label">Custom</div>
    <div class="custom-section">
      <div class="custom-section-header">
        <span class="custom-section-title">Extra Items</span>
        <button class="add-custom-btn" onclick="addCustom()">+ Add Line</button>
      </div>
      ${rows || `<div class="custom-empty">Tap + Add Line to add extras</div>`}
    </div>`;
}

/* ---- ACTIONS ---- */
function filterItems() {
  searchQuery = document.getElementById("searchInput").value.trim().toLowerCase();
  renderItems();
}

function changeSteps(name, delta) {
  const m = MEATS.find(x => x.name === name);
  const amt = m && m.halfStep ? 1 : 2;
  orders[name].steps = Math.max(0, orders[name].steps + delta * amt);
  const el = document.getElementById(`qty-${sid(name)}`);
  if (el) el.textContent = fmt(orders[name].steps);
  const card = document.getElementById(`card-${sid(name)}`);
  if (card) card.classList.toggle("has-order", orders[name].steps > 0);
  updateFooter();
}

function setOnHand(name, val) {
  orders[name].onHand = val;
  updateDrum(name, val, 0);
}

function updateDrum(name, val, dir) {
  const drum = document.getElementById(`drum-${sid(name)}`);
  if (!drum) return;
  const isEmpty = val === '' || val === null || val === undefined;
  const display = isEmpty ? '—' : String(val);
  const isMuted = isEmpty;

  if (dir === 0) {
    const span = document.getElementById(`drumval-${sid(name)}`);
    if (span) { span.textContent = display; span.className = 'onhand-drum-val' + (isMuted ? ' muted' : ''); }
    return;
  }

  const old = drum.querySelector('.onhand-drum-val');
  if (old) {
    old.id = '';
    old.style.animation = `${dir > 0 ? 'drumSlideOutUp' : 'drumSlideOutDown'} 0.12s ease-in forwards`;
    setTimeout(() => old.parentNode && old.remove(), 130);
  }
  const next = document.createElement('span');
  next.id = `drumval-${sid(name)}`;
  next.className = 'onhand-drum-val' + (isMuted ? ' muted' : '');
  next.textContent = display;
  next.style.animation = `${dir > 0 ? 'drumSlideInUp' : 'drumSlideInDown'} 0.12s ease-out forwards`;
  drum.appendChild(next);
}

function scrollOnHand(name, drum, e) {
  e.preventDefault();
  const dir = e.deltaY < 0 ? 1 : -1;
  const newVal = Math.max(0, (parseInt(orders[name].onHand) || 0) + dir);
  orders[name].onHand = String(newVal);
  updateDrum(name, String(newVal), dir);
}

let _dialName = null, _dialStartY = 0, _dialStartVal = 0, _dialLastVal = 0, _dialMoved = false;

function dialStart(name, drum, e) {
  _dialName = name;
  _dialStartY = e.touches[0].clientY;
  _dialStartVal = parseInt(orders[name].onHand) || 0;
  _dialLastVal = _dialStartVal;
  _dialMoved = false;
}

function dialMove(name, drum, e) {
  const dy = _dialStartY - e.touches[0].clientY;
  if (Math.abs(dy) > 4) {
    e.preventDefault();
    _dialMoved = true;
    drum.classList.add('dialing');
    const newVal = Math.max(0, _dialStartVal + Math.round(dy / 10));
    if (newVal !== _dialLastVal) {
      const dir = newVal > _dialLastVal ? 1 : -1;
      _dialLastVal = newVal;
      orders[name].onHand = String(newVal);
      const span = document.getElementById(`drumval-${sid(name)}`);
      if (span) {
        span.textContent = newVal;
        span.className = 'onhand-drum-val';
        span.style.animation = 'none';
        requestAnimationFrame(() => { span.style.animation = 'drumPop 0.1s ease-out'; });
      }
    }
  }
}

function dialEnd(name, drum, e) {
  drum.classList.remove('dialing');
  _dialName = null;
}

function drumTap(name, drum) {
  if (_dialMoved) { _dialMoved = false; return; }
  const input = document.createElement('input');
  input.type = 'text';
  input.inputMode = 'numeric';
  input.value = orders[name].onHand;
  Object.assign(input.style, {
    position: 'absolute', inset: '0', width: '100%', height: '100%',
    border: 'none', background: '#fff', outline: 'none',
    fontFamily: "'DM Mono', monospace", fontSize: '15px', fontWeight: '500',
    textAlign: 'center', borderRadius: '4px', color: 'var(--ink)', zIndex: '10'
  });
  drum.appendChild(input);
  setTimeout(() => { input.focus(); input.select(); }, 10);
  const finish = () => {
    const val = input.value.trim();
    orders[name].onHand = val;
    updateDrum(name, val, 0);
    if (input.parentNode) input.remove();
  };
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
}

function addCustom() {
  const id = nextId++;
  customItems.push({ id, name: "", qty: 0 });
  // Surgically insert new row without full re-render to preserve focus elsewhere
  const section = document.querySelector(".custom-section");
  if (!section) { renderItems(); } else {
    // Remove empty state if present
    const empty = section.querySelector(".custom-empty");
    if (empty) empty.remove();
    const row = document.createElement("div");
    row.innerHTML = `
      <div class="custom-row" id="crow-${id}">
        <input class="custom-name-input" type="text" placeholder="Item name…"
          value=""
          oninput="updateCustomName(${id},this.value)">
        <div class="qty-control">
          <button class="qty-btn" onclick="changeCustomQty(${id},-1)">−</button>
          <div class="qty-num" id="cqty-${id}">0</div>
          <button class="qty-btn" onclick="changeCustomQty(${id},1)">+</button>
        </div>
        <button class="custom-delete-btn" onclick="removeCustom(${id})">×</button>
      </div>`;
    section.appendChild(row.firstElementChild);
  }
  setTimeout(() => {
    const input = document.querySelector(`#crow-${id} .custom-name-input`);
    if (input) input.focus();
  }, 30);
}

function removeCustom(id) {
  customItems = customItems.filter(c => c.id !== id);
  const row = document.getElementById(`crow-${id}`);
  if (row) row.remove();
  // Re-show empty state if no rows left
  const section = document.querySelector(".custom-section");
  if (section && !section.querySelector(".custom-row")) {
    const empty = document.createElement("div");
    empty.className = "custom-empty";
    empty.textContent = "Tap + Add Line to add extras";
    section.appendChild(empty);
  }
  updateFooter();
}

function updateCustomName(id, val) {
  const item = customItems.find(c => c.id === id);
  if (!item) return;
  item.name = val;
  const row = document.getElementById(`crow-${id}`);
  if (row) row.classList.toggle("filled", val.trim() !== "" && item.qty > 0);
  updateFooter();
}

function changeCustomQty(id, delta) {
  const item = customItems.find(c => c.id === id);
  if (!item) return;
  item.qty = Math.max(0, item.qty + delta);
  const el = document.getElementById(`cqty-${id}`);
  if (el) el.textContent = item.qty;
  const row = document.getElementById(`crow-${id}`);
  if (row) row.classList.toggle("filled", item.name.trim() !== "" && item.qty > 0);
  updateFooter();
}

function orderedMeats() { return MEATS.filter(m => orders[m.name].steps > 0); }
function orderedCustoms() { return customItems.filter(c => c.name.trim() && c.qty > 0); }

function updateFooter() {
  const total = orderedMeats().length + orderedCustoms().length;
  document.getElementById("cartCount").textContent = total;
  const footer = document.getElementById("orderFooter");
  if (total > 0) {
    footer.classList.add("visible");
    document.getElementById("footerItems").textContent = `${total} item${total!==1?"s":""} selected`;
  } else {
    footer.classList.remove("visible");
  }
}

function openSheet() {
  const meats = orderedMeats(), customs = orderedCustoms();
  if (!meats.length && !customs.length) { alert("No items in your order yet."); return; }
  const date = new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
  document.getElementById("sheetDate").textContent = date.toUpperCase();
  let html = meats.map(m=>`
    <div class="sheet-item">
      <div class="sheet-item-name">${m.name}</div>
      <div class="sheet-item-qty">${fmt(orders[m.name].steps)}</div>
    </div>`).join("");
  html += customs.map(c=>`
    <div class="sheet-item">
      <div><div class="sheet-item-name">${esc(c.name)}</div><div class="sheet-item-badge">CUSTOM</div></div>
      <div class="sheet-item-qty">${c.qty}</div>
    </div>`).join("");
  document.getElementById("sheetItems").innerHTML = html;
  document.getElementById("sheetOverlay").classList.add("open");
}

function closeSheet() { document.getElementById("sheetOverlay").classList.remove("open"); }
function closeSheetOutside(e) { if (e.target===document.getElementById("sheetOverlay")) closeSheet(); }

function copyOrder() {
  const meats = orderedMeats(), customs = orderedCustoms();
  let text = "";
  meats.forEach(m => { text += `${fmt(orders[m.name].steps)} - ${m.name}\n`; });
  customs.forEach(c => { text += `${c.qty} - ${c.name.trim()}\n`; });
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById("copyBtn");
    btn.textContent = "✅ Copied!";
    setTimeout(()=>btn.textContent="📋 Copy Order", 2000);
  }).catch(()=>{ prompt("Copy your order:", text); });
}

function sendImessage() {
  const meats = orderedMeats(), customs = orderedCustoms();
  let text = "";
  meats.forEach(m => { text += `${fmt(orders[m.name].steps)} - ${m.name}\n`; });
  customs.forEach(c => { text += `${c.qty} - ${c.name.trim()}\n`; });
  text = text.trim();
  navigator.clipboard.writeText(text).catch(()=>{});
  window.location.href = `sms:&body=${encodeURIComponent(text)}`;
}

function confirmClear() { document.getElementById("confirmOverlay").classList.add("open"); }
function closeConfirm() { document.getElementById("confirmOverlay").classList.remove("open"); }
function clearCart() {
  MEATS.forEach(m => { orders[m.name] = { steps: 0, onHand: "" }; });
  customItems = []; nextId = 1;
  closeConfirm(); closeSheet();
  renderItems(); updateFooter();
}

initOrders();
renderItems();

document.addEventListener('touchmove', function(e) {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });
let lastTap = 0;
document.addEventListener('touchend', function(e) {
  const now = Date.now();
  if (now - lastTap < 300 && !e.target.closest('button, input, a, label')) e.preventDefault();
  lastTap = now;
}, { passive: false });
</script>
</body>
</html>
